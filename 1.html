<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>No Cut HLS</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
    }
    video {
      width: 100%;
      height: 100%;
      background: black;
      object-fit: contain;
    }
  </style>
</head>
<body>

<video id="video" controls autoplay muted playsinline></video>

<script>
  const video = document.getElementById("video");
  const stream = "http://maveniptv.net:80/live/ahmedELmetwally85/ah8759946/10421.m3u8";

  if (Hls.isSupported()) {
    const hls = new Hls({
      // ثبات أولاً
      enableWorker: true,
      lowLatencyMode: false,

      // بافر عملاق
      maxBufferLength: 120,
      maxMaxBufferLength: 240,
      backBufferLength: 300,

      // اقفل الـ ABR
      startLevel: 0,
      capLevelToPlayerSize: true,
      abrEnabled: false,

      // مهلة تحميل طويلة
      fragLoadingTimeOut: 30000,
      levelLoadingTimeOut: 30000,
      manifestLoadingTimeOut: 30000
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      // اجبر أقل جودة
      hls.currentLevel = 0;
      video.play();
    });

    hls.on(Hls.Events.ERROR, function (event, data) {
      if (data.fatal) {
        console.log("Reloading stream...");
        hls.destroy();
        location.reload();
      }
    });

  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = stream;
    video.play();
  }
</script>

</body>
</html>
